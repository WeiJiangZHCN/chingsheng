name: Deploy Nuxt site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5
        # 移除 static_site_generator: nuxt，因为该选项目前主要针对传统 Node/NPM 流程

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Static HTML export with Nuxt
        run: bun run generate # Nuxt 静态导出建议使用 generate 命令

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Nuxt generate 默认输出目录是 .output/public
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5