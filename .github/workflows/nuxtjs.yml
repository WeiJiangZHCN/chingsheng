# Deploy Nuxt site to GitHub Pages using Bun
name: Deploy Nuxt site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: nuxt

      # 依赖缓存
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            dist
            .nuxt
            node_modules
          key: ${{ runner.os }}-nuxt-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-bun-

      # 安装依赖 + 生成静态站点
      - name: Install dependencies
        run: bun install

      - name: Static HTML export with Nuxt
        run: bun run build

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5